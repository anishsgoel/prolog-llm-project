name: bio_signal_mapk
# Signal-transduction pathway reconstruction (EGF -> MAPK/ERK -> MYC).
# We omit the canonical MEK->ERK step signals(map2k1, mapk1); the cascade is
# then broken and MYC is unreachable from EGF. The LLM should re-propose the
# missing kinase link with high confidence.
# Tip: to instead demonstrate "predict the missing intermediate node", omit
# BOTH signals(braf, map2k1) and signals(map2k1, mapk1) and set
# allow_new_constants: true, so map2k1 must be re-introduced from scratch.
goal: "propagates(egf, myc)"
kb_file: kb/bio_signal_mapk.pl
propose_facts: signals/2
omit_fact_ids: [7]
solver:
  allow_new_constants: false